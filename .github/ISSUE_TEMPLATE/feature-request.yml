name: Feature request
description: Suggest a new feature or improvement for Servel.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion! Please describe the problem first, then the proposed solution — that helps us evaluate alternatives.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What pain point does this address? What are you trying to do that is awkward today?
      placeholder: "When I switch projects, I have to manually stop one service and start another. Would be nice to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they didn't fit.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, related links, or other context.

  - type: checkboxes
    id: prereq-check
    attributes:
      label: Prerequisites
      options:
        - label: I have searched existing issues and discussions for similar requests.
          required: true
